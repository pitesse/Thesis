# infrastructure stack: kafka (message broker) + flink (stream processor).
# the python producer runs on the host, the flink job jar is submitted into the cluster.

services:
  # --- kafka cluster (single-broker, zookeeper-based) ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # dual listeners: INTERNAL for container-to-container (flink -> kafka),
      # EXTERNAL for host-to-container (python producer -> kafka)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # auto-create topics so we don't need manual "kafka-topics --create" for f1-telemetry
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # replication factor = 1: single-broker dev setup, not suitable for production
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # --- flink cluster (1 jobmanager + 1 taskmanager) ---

  jobmanager:
    image: flink:1.20-java17
    container_name: flink-jobmanager
    depends_on:
      - kafka
    ports:
      - "8081:8081"   # flink web ui
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager

  taskmanager:
    image: flink:1.20-java17
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      # 6 task slots: accommodates 3 kafka source operators, deserialization, watermarks,
      # cep patterns, and print sinks with operator chaining at parallelism=1
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=6
