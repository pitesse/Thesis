# full stack: kafka (broker), flink (stream processor, built from source), python services.
# flink fat jar is baked into the image via multi-stage docker build.
# the job is submitted at runtime via `flink run` inside the jobmanager container.

services:
  #  kafka cluster (single-broker, zookeeper-based) 

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # dual listeners: INTERNAL for container-to-container (flink -> kafka),
      # EXTERNAL for host-to-container (python producer -> kafka)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # auto-create topics so we don't need manual "kafka-topics --create" for f1-telemetry
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # replication factor = 1: single-broker dev setup, not suitable for production
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  #  flink cluster (1 jobmanager + 1 taskmanager) 

  jobmanager:
    build:
      context: ./f1-telemetry-processor
      dockerfile: Dockerfile
    image: f1-flink-processor
    container_name: flink-jobmanager
    depends_on:
      - kafka
    ports:
      - "8081:8081" # flink web ui
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    volumes:
      - ./data_lake:/opt/flink/data_lake

  taskmanager:
    build:
      context: ./f1-telemetry-processor
      dockerfile: Dockerfile
    image: f1-flink-processor
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      # 6 task slots: accommodates 3 kafka source operators, deserialization, watermarks,
      # cep patterns, and print sinks with operator chaining at parallelism=1
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=6
    volumes:
      # maps container output to host for ml dataset access.
      # flink FileSink writes json-lines to /opt/flink/data_lake/{pit_evals,tire_drops}/
      - ./data_lake:/opt/flink/data_lake

  # python services (shared image: f1-python-app) 

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: f1-python-app
    container_name: f1-dashboard
    depends_on:
      - kafka
    ports:
      - "8501:8501"
    environment:
      - KAFKA_BROKER=kafka:29092
    volumes:
      - ./data_lake:/app/data_lake
    command: ["streamlit", "run", "dashboard/app.py", "--server.headless", "true", "--server.address", "0.0.0.0"]

  # optional live inference consumer. enable with: docker compose --profile inference up -d
  ml-inference:
    build:
      context: .
      dockerfile: Dockerfile
    image: f1-python-app
    container_name: f1-ml-inference
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:29092
    volumes:
      - ./data_lake:/app/data_lake
      - ./ml_pipeline:/app/ml_pipeline
    command:
      [
        "python",
        "ml_pipeline/serve_model.py",
        "--bootstrap",
        "kafka:29092",
        "--model-bundle",
        "data_lake/models/pit_strategy_serving_bundle.joblib"
      ]
    profiles:
      - inference

  # cli service for ad-hoc python commands (prepare_race, stream_race, ml training).
  # not started by `docker compose up`, invoked via `docker compose run --rm producer <cmd>`.
  producer:
    build:
      context: .
      dockerfile: Dockerfile
    image: f1-python-app
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:29092
    volumes:
      # fastf1 cache and prepared parquet files (shared between host and container)
      - ./data:/app/data
      # flink output csvs (needed by ml pipeline)
      - ./data_lake:/app/data_lake
      # ml pipeline source + artifacts (persist model pkl and plots)
      - ./ml_pipeline:/app/ml_pipeline
    profiles:
      - cli
